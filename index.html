<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Moomin Mug Collection</title>
  <meta name="description" content="Photograph your Moomin mugs and build your collection — local-first, powered by Gemini." />
  <meta name="theme-color" content="#0b0c0f" />
  <style>
    :root{
      --bg:#0b0c0f;
      --bg2:#0f1117;
      --card:#12141a;
      --muted:#8b93a7;
      --text:#e9ecf5;
      --border:#242839;
      --accent:#7aa2ff;
      --accent2:#9cf2c7;
      --gold:#ffd36a;
      --danger:#ff6b6b;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 18px;
    }
    @media (prefers-color-scheme: light){
      :root{
        --bg:#f5f6fb;
        --bg2:#eef0f8;
        --card:#ffffff;
        --muted:#59627a;
        --text:#0f172a;
        --border:#e6e8f0;
        --accent:#3b6bf6;
        --accent2:#10b981;
        --gold:#d99a10;
        --danger:#ef4444;
        --shadow: 0 12px 30px rgba(15,23,42,.08);
      }
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1100px 500px at 100% -10%, color-mix(in srgb, var(--accent) 12%, transparent), transparent),
        radial-gradient(900px 500px at -10% 0%, color-mix(in srgb, var(--accent2) 12%, transparent), transparent),
        var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }
    a{color:var(--accent)}
    .wrap{max-width:1120px;margin:0 auto;padding:16px 16px 108px}
    .top{display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .logo{
      width:44px;height:44px;border-radius:14px;flex:none;
      display:flex;align-items:center;justify-content:center;font-size:24px;
      background: linear-gradient(135deg, color-mix(in srgb,var(--accent) 60%, #fff 8%), color-mix(in srgb,var(--accent2) 55%, var(--accent) 45%));
      box-shadow: var(--shadow);
    }
    .title{display:flex;flex-direction:column;gap:2px;min-width:0}
    h1{font-size:19px; margin:0; letter-spacing:-.02em}
    .sub{color:var(--muted); font-size:12px}
    .actions{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
    button,.btn{
      appearance:none; border:1px solid var(--border);
      background: var(--card); color: var(--text);
      padding:10px 13px; border-radius: 999px; cursor:pointer;
      font-weight:600; font-size:13px;
      display:inline-flex; align-items:center; gap:8px; line-height:1;
      transition: border-color .15s, transform .05s;
    }
    button:hover{border-color: color-mix(in srgb, var(--border) 55%, var(--accent))}
    button:active{transform: translateY(1px)}
    button:disabled{opacity:.5; cursor:not-allowed}
    .primary{
      background: linear-gradient(135deg, color-mix(in srgb,var(--accent) 92%, #fff 8%), color-mix(in srgb,var(--accent2) 55%, var(--accent) 45%));
      border-color: transparent; color: #07101f;
    }
    .ghost{background:transparent}
    .danger{border-color: color-mix(in srgb, var(--danger) 55%, var(--border)); color: var(--danger)}
    .icon{padding:10px; width:40px; height:40px; justify-content:center}
    .pill{padding:6px 10px; border-radius:999px; border:1px solid var(--border); font-size:12px; color: var(--muted); background: color-mix(in srgb, var(--card) 70%, transparent)}
    .grid{display:grid; gap:12px}
    .card{background: var(--card); border:1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow)}
    .card.pad{padding:14px}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
    .field{display:flex; flex-direction:column; gap:6px; flex:1; min-width:150px}
    label{font-size:12px; color: var(--muted)}
    input, textarea, select{
      width:100%; padding:10px 12px; border-radius: 13px;
      border:1px solid var(--border); background: transparent; color: var(--text);
      font-size:14px; outline:none;
    }
    input:focus, textarea:focus, select:focus{border-color: color-mix(in srgb, var(--border) 40%, var(--accent))}
    textarea{min-height:80px; resize:vertical}
    input::placeholder, textarea::placeholder{color: color-mix(in srgb, var(--muted) 90%, transparent)}

    .tabs{display:flex; gap:6px; margin: 6px 0 14px; overflow-x:auto; padding-bottom:2px}
    .tabbtn{padding:10px 14px; border-radius: 999px; border:1px solid var(--border); background: transparent; color: var(--muted); font-weight:700; white-space:nowrap}
    .tabbtn.active{background: color-mix(in srgb, var(--card) 85%, transparent); color: var(--text); border-color: color-mix(in srgb, var(--border) 40%, var(--accent))}

    .muggrid{display:grid; gap:12px; grid-template-columns: 1fr}
    @media (min-width: 620px){ .muggrid{grid-template-columns:1fr 1fr} }
    @media (min-width: 980px){ .muggrid{grid-template-columns:1fr 1fr 1fr} }
    .mug{padding:0; overflow:hidden; display:flex; flex-direction:column}
    .mugphoto{aspect-ratio: 4/3; background: color-mix(in srgb, var(--card) 60%, var(--bg2)); position:relative; display:flex; align-items:center; justify-content:center}
    .mugphoto img{width:100%; height:100%; object-fit:cover; display:block}
    .mugphoto .ph{font-size:44px; opacity:.5}
    .mugbody{padding:12px 14px 14px; display:flex; flex-direction:column; gap:8px; flex:1}
    .mugname{font-weight:800; font-size:15px; margin:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
    .muted{color:var(--muted)}
    .badges{display:flex; flex-wrap:wrap; gap:6px}
    .badge{font-size:11px; padding:5px 9px; border-radius:999px; border:1px solid var(--border); background: transparent; color: var(--muted); display:inline-flex; align-items:center; gap:5px}
    .badge.owned{border-color: color-mix(in srgb, var(--accent2) 45%, var(--border)); color: color-mix(in srgb, var(--accent2) 78%, var(--text))}
    .badge.wishlist{border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); color: color-mix(in srgb, var(--accent) 80%, var(--text))}
    .badge.sold{opacity:.8}
    .badge.fav{border-color: color-mix(in srgb, var(--gold) 55%, var(--border)); color:var(--gold)}
    .chip{font-size:11px;padding:5px 9px;border-radius:999px;background: color-mix(in srgb, var(--card) 75%, transparent);border:1px solid var(--border)}
    .abschip{position:absolute; top:8px; left:8px; display:flex; gap:6px}
    .abschip .badge{background: color-mix(in srgb, #000 45%, transparent); backdrop-filter: blur(6px); color:#fff; border-color: rgba(255,255,255,.2)}
    .mugfoot{display:flex; gap:8px; margin-top:auto; padding-top:8px}
    .mugfoot button{flex:1; padding:8px 6px; justify-content:center}
    .divider{height:1px;background:var(--border);margin:8px 0}
    .lineclamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;padding: 12px;z-index:50; backdrop-filter: blur(2px)}
    @media (min-width: 720px){ .overlay{align-items:center} }
    .modal{width:min(720px, 100%);background: var(--card);border:1px solid var(--border);border-radius: 22px;box-shadow: var(--shadow);max-height: 90vh;overflow:auto}
    .modal.wide{width:min(920px,100%)}
    .modal .head{padding:16px 16px 0; position:sticky; top:0; background: var(--card); z-index:2}
    .modal h2{margin:0;font-size:16px}
    .modal .body{padding:14px 16px 16px}
    .modal .foot{padding:12px 16px 16px; display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; position:sticky; bottom:0; background: var(--card)}
    .help{font-size:12px;color:var(--muted)}
    .err{font-size:12px;color:var(--danger);margin-top:6px}
    .note{font-size:12px; padding:10px 12px; border-radius:12px; border:1px solid var(--border); background: color-mix(in srgb, var(--card) 60%, transparent); color:var(--muted)}
    .note.warn{border-color: color-mix(in srgb, var(--gold) 45%, var(--border)); color: color-mix(in srgb, var(--gold) 80%, var(--text))}

    .fab{position:fixed;right:16px;bottom:16px;width:58px;height:58px;border-radius:999px;display:flex;align-items:center;justify-content:center;box-shadow: var(--shadow);z-index:40; font-size:22px}
    @media(min-width: 720px){ .fab{display:none} }

    .kpi{display:grid; gap:12px; grid-template-columns:1fr 1fr}
    @media(min-width: 820px){ .kpi{grid-template-columns:repeat(4,1fr)} }
    .kpicard{padding:14px}
    .kpilabel{font-size:12px;color:var(--muted)}
    .kpivalue{font-size:22px;font-weight:900;margin-top:6px}
    .mini{font-size:12px;color:var(--muted)}
    .list{display:grid; gap:8px}
    .listrow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 12px; border:1px solid var(--border); border-radius: 14px}
    .bar{height:8px;border-radius:999px;background: color-mix(in srgb,var(--border) 60%, transparent);overflow:hidden;flex:1;min-width:80px}
    .bar > span{display:block;height:100%;background: linear-gradient(90deg,var(--accent),var(--accent2))}
    .sr-only{position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden}

    .drop{border:2px dashed var(--border); border-radius:16px; padding:22px; text-align:center; color:var(--muted); background: color-mix(in srgb, var(--card) 50%, transparent)}
    .scanrow{display:flex; gap:12px; align-items:flex-start; padding:12px; border:1px solid var(--border); border-radius:14px}
    .scanthumb{width:64px;height:64px;border-radius:12px;overflow:hidden;flex:none;background: var(--bg2);display:flex;align-items:center;justify-content:center}
    .scanthumb img{width:100%;height:100%;object-fit:cover}
    .spin{width:16px;height:16px;border-radius:999px;border:2px solid color-mix(in srgb,var(--text) 25%, transparent);border-top-color: var(--text);animation:sp .7s linear infinite;display:inline-block}
    @keyframes sp{to{transform:rotate(360deg)}}
    .conf{display:inline-flex;align-items:center;gap:6px;font-size:11px}
    .conf b{color:var(--text)}
    .switch{display:flex;align-items:center;gap:8px;justify-content:space-between;padding:9px 12px;border:1px solid var(--border);border-radius:13px}
    .link{color:var(--accent);text-decoration:none;word-break:break-word}
    .srcitem{padding:10px 12px;border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:2px}
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    /* @jsxRuntime classic */
    const {useEffect, useMemo, useRef, useState, useCallback} = React;

    /* ---------------------------------------------------------------- *
     * Storage + constants
     * ---------------------------------------------------------------- */
    const STORAGE_KEY = "moomin_mugs_v3";
    const SETTINGS_KEY = "moomin_settings_v1";

    const STATUSES = [
      { value: "owned", label: "Owned" },
      { value: "wishlist", label: "Wishlist" },
      { value: "sold", label: "Sold" },
    ];
    const CONDITIONS = ["New","Like New","Very Good","Good","Fair","Poor"];
    const DEFAULT_MODEL = "gemini-2.5-flash";

    /* ---------------------------------------------------------------- *
     * Small helpers
     * ---------------------------------------------------------------- */
    const uid = () => `${Date.now().toString(36)}_${Math.random().toString(36).slice(2,10)}`;
    function safeJsonParse(s, fallback){ try{ const v = JSON.parse(s); return v ?? fallback; }catch{ return fallback; } }
    const toISODate = (d) => d ? String(d).slice(0,10) : "";
    const normalizeText = (s) => (s||"").toString().trim().toLowerCase();
    const nowISO = () => new Date().toISOString();
    function tokenizeTags(s){ return (s||"").split(/[,#\n]+/).map(t=>t.trim()).filter(Boolean); }
    function formatMoney(amount, currency="SEK"){
      if(amount==="" || amount==null) return "";
      const n = Number(amount);
      if(!Number.isFinite(n)) return "";
      try{ return new Intl.NumberFormat(undefined,{style:"currency",currency,maximumFractionDigits:0}).format(n); }
      catch{ return `${Math.round(n)} ${currency}`; }
    }
    function fileToDataUrl(file){
      return new Promise((res,rej)=>{ const r=new FileReader(); r.onerror=()=>rej(new Error("Failed to read image")); r.onload=()=>res(String(r.result||"")); r.readAsDataURL(file); });
    }
    // Downscale + re-encode to keep localStorage and API payloads small.
    function downscaleImage(dataUrl, maxDim=1280, quality=0.82){
      return new Promise((res)=>{
        const img = new Image();
        img.onload = ()=>{
          let {width:w, height:h} = img;
          const scale = Math.min(1, maxDim/Math.max(w,h));
          w = Math.round(w*scale); h = Math.round(h*scale);
          const c = document.createElement("canvas"); c.width=w; c.height=h;
          c.getContext("2d").drawImage(img,0,0,w,h);
          try{ res(c.toDataURL("image/jpeg", quality)); }catch{ res(dataUrl); }
        };
        img.onerror = ()=>res(dataUrl);
        img.src = dataUrl;
      });
    }
    const dataUrlParts = (dataUrl)=>{
      const m = /^data:([^;]+);base64,(.*)$/.exec(dataUrl||"");
      return m ? {mime:m[1], data:m[2]} : {mime:"image/jpeg", data:(dataUrl||"").split(",").pop()||""};
    };

    /* ---------------------------------------------------------------- *
     * Gemini client (called directly from the browser with the user's key)
     * ---------------------------------------------------------------- */
    const MUG_PROPS = {
      isMoominMug:{type:"BOOLEAN"},
      character:{type:"STRING"},
      series:{type:"STRING"},
      edition:{type:"STRING"},
      year:{type:"INTEGER", nullable:true},
      condition:{type:"STRING"},
      conditionNotes:{type:"STRING"},
      estimatedValueLow:{type:"NUMBER", nullable:true},
      estimatedValueHigh:{type:"NUMBER", nullable:true},
      valueCurrency:{type:"STRING"},
      confidence:{type:"NUMBER"},
      notes:{type:"STRING"},
    };
    const MUG_SCHEMA = { type:"OBJECT", properties: MUG_PROPS, required:["isMoominMug","character","confidence"] };
    const SHELF_SCHEMA = {
      type:"OBJECT",
      properties:{ mugs:{ type:"ARRAY", items:{ type:"OBJECT", properties:{ ...MUG_PROPS, position:{type:"STRING"} }, required:["character","confidence"] } } },
      required:["mugs"],
    };
    const CATALOG_SCHEMA = {
      type:"OBJECT",
      properties:{ mugs:{ type:"ARRAY", items:{ type:"OBJECT", properties:{ character:{type:"STRING"}, year:{type:"INTEGER",nullable:true}, edition:{type:"STRING"}, notes:{type:"STRING"} }, required:["character"] } } },
      required:["mugs"],
    };

    const IDENTIFY_SYSTEM =
      "You are an expert on Moomin ceramics — especially Arabia (Finland) Moomin mugs, plus seasonal, limited and anniversary editions. " +
      "Identify Moomin mugs precisely from photographs. Read visible artwork, the character(s), the illustration style, and any text/stamps. " +
      "Estimate secondhand market value as a low–high range in the requested currency, and note visible condition (chips, cracks, crazing, gilding wear, fading). " +
      "Give a confidence between 0 and 1. If the item is clearly not a Moomin mug, set isMoominMug=false. Never invent a year you cannot support — use null when unsure.";

    async function geminiCall(settings, {parts, schema, useSearch, system}){
      if(!settings?.apiKey) throw new Error("No Gemini API key set. Open Settings (gear icon) to add one.");
      const model = (settings.model || DEFAULT_MODEL).trim();
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(settings.apiKey)}`;
      const body = { contents:[{ role:"user", parts }] };
      if(system) body.systemInstruction = { parts:[{text:system}] };
      const gc = {};
      if(schema && !useSearch){ gc.responseMimeType="application/json"; gc.responseSchema=schema; }
      if(Object.keys(gc).length) body.generationConfig = gc;
      if(useSearch) body.tools = [{ google_search:{} }];
      const res = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
      if(!res.ok){
        let msg = `Gemini ${res.status}`;
        try{ const j = await res.json(); msg = j?.error?.message || msg; }catch{}
        if(res.status===400 && /API key|API_KEY/.test(msg)) msg = "Gemini rejected the API key. Check it in Settings.";
        if(res.status===404) msg = `Model "${model}" not found for this key. Pick another in Settings.`;
        throw new Error(msg);
      }
      const data = await res.json();
      const cand = data.candidates?.[0];
      const text = (cand?.content?.parts||[]).map(p=>p.text).filter(Boolean).join("");
      if(cand?.finishReason && cand.finishReason!=="STOP" && !text) throw new Error(`Gemini stopped: ${cand.finishReason}`);
      return { text, candidate: cand, raw: data };
    }
    function parseJsonText(text){
      let t = (text||"").trim();
      const fence = /```(?:json)?\s*([\s\S]*?)```/i.exec(t);
      if(fence) t = fence[1].trim();
      const start = t.search(/[[{]/); if(start>0) t = t.slice(start);
      return safeJsonParse(t, null);
    }

    async function listGeminiModels(apiKey){
      const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${encodeURIComponent(apiKey)}&pageSize=200`;
      const res = await fetch(url);
      if(!res.ok){ let m=`HTTP ${res.status}`; try{const j=await res.json();m=j?.error?.message||m;}catch{} throw new Error(m); }
      const data = await res.json();
      return (data.models||[])
        .filter(m => (m.supportedGenerationMethods||[]).includes("generateContent"))
        .map(m => (m.name||"").replace(/^models\//,""))
        .filter(n => /gemini/i.test(n) && !/embedding|aqa/i.test(n));
    }

    async function identifyMug(settings, dataUrl){
      const {mime, data} = dataUrlParts(dataUrl);
      const cur = settings.currency || "SEK";
      const prompt = `Identify this single Moomin mug. Estimate value in ${cur}${settings.region?` for the ${settings.region} market`:""}. Return JSON only.`;
      const { text } = await geminiCall(settings, {
        system: IDENTIFY_SYSTEM, schema: MUG_SCHEMA,
        parts: [{text: prompt}, {inline_data:{mime_type:mime, data}}],
      });
      const obj = parseJsonText(text);
      if(!obj) throw new Error("Could not read Gemini's response. Try again or a different model.");
      return obj;
    }

    async function identifyShelf(settings, dataUrl){
      const {mime, data} = dataUrlParts(dataUrl);
      const cur = settings.currency || "SEK";
      const prompt = `This photo shows a shelf/group of Moomin mugs. Identify EACH mug you can see as a separate entry, left-to-right, top-to-bottom. ` +
        `For each, describe its position (e.g. "top shelf, 2nd from left"). Estimate value in ${cur}${settings.region?` for the ${settings.region} market`:""}. Return JSON only.`;
      const { text } = await geminiCall(settings, {
        system: IDENTIFY_SYSTEM, schema: SHELF_SCHEMA,
        parts: [{text: prompt}, {inline_data:{mime_type:mime, data}}],
      });
      const obj = parseJsonText(text);
      const arr = Array.isArray(obj) ? obj : (obj?.mugs || []);
      return Array.isArray(arr) ? arr : [];
    }

    async function findSeriesMugs(settings, series){
      const prompt = `List the mugs released in the "${series}" Moomin series/line. For each, give the character/name, the release year if known (else null), the edition type (standard, seasonal, limited, anniversary, etc.), and a short note. Be as complete and accurate as you can. Return JSON only.`;
      const { text } = await geminiCall(settings, { schema: CATALOG_SCHEMA, parts:[{text:prompt}] });
      const obj = parseJsonText(text);
      const arr = Array.isArray(obj) ? obj : (obj?.mugs || []);
      return Array.isArray(arr) ? arr : [];
    }

    async function checkAvailability(settings, mug){
      const q = [mug.name, mug.series, mug.year, "Moomin mug"].filter(Boolean).join(" ");
      const prompt = `Search the web — popular retailers and second-hand marketplaces (e.g. eBay, Etsy, Tradera, Vinted, Finnish Design Shop, Arabia) — for this item currently for sale:\n"${q}".\n` +
        `${settings.region?`Prioritise availability and prices for the ${settings.region} market. `:""}` +
        `List any live listings with: seller/retailer, price, and a direct link. If you find nothing concrete, say so. Keep it concise.`;
      const { candidate, text } = await geminiCall(settings, { useSearch:true, parts:[{text:prompt}] });
      const chunks = candidate?.groundingMetadata?.groundingChunks || [];
      const sources = chunks.map(c => c.web).filter(Boolean).map(w => ({ title: w.title || w.uri, uri: w.uri }));
      return { text, sources };
    }

    /* ---------------------------------------------------------------- *
     * AI result -> mug draft
     * ---------------------------------------------------------------- */
    function draftFromAI(ai, settings, photoUrl=""){
      const cur = ai.valueCurrency || settings.currency || "SEK";
      const low = Number.isFinite(Number(ai.estimatedValueLow)) ? Number(ai.estimatedValueLow) : null;
      const high = Number.isFinite(Number(ai.estimatedValueHigh)) ? Number(ai.estimatedValueHigh) : null;
      return {
        id: uid(),
        name: ai.character || "",
        series: ai.series || "Arabia Moomin",
        edition: ai.edition || "",
        year: (ai.year!=null && ai.year!=="") ? ai.year : "",
        status: "owned",
        condition: CONDITIONS.includes(ai.condition) ? ai.condition : "Good",
        conditionNotes: ai.conditionNotes || "",
        location: "",
        acquiredDate: "",
        price: "",
        currency: settings.currency || "SEK",
        favorite: false,
        photoUrl: photoUrl || "",
        estValueLow: low, estValueHigh: high, estValueCurrency: cur,
        notes: ai.notes || "",
        tags: [],
        aiConfidence: Number.isFinite(Number(ai.confidence)) ? Number(ai.confidence) : null,
      };
    }
    function blankMug(settings){
      return { id: uid(), name:"", series:"Arabia Moomin", edition:"", year:"", status:"owned",
        condition:"Good", conditionNotes:"", location:"", acquiredDate:"", price:"", currency:settings.currency||"SEK",
        favorite:false, photoUrl:"", estValueLow:null, estValueHigh:null, estValueCurrency:settings.currency||"SEK",
        notes:"", tags:[], aiConfidence:null };
    }
    // duplicate guard: same character, plus matching year OR series
    function findDuplicates(cand, mugs){
      const n = normalizeText(cand.name);
      if(!n) return [];
      return mugs.filter(m=>{
        if(m.id===cand.id) return false;
        if(normalizeText(m.name)!==n) return false;
        const sameYear = cand.year && m.year && String(cand.year)===String(m.year);
        const sameSeries = normalizeText(cand.series) && normalizeText(cand.series)===normalizeText(m.series);
        return sameYear || sameSeries || (!cand.year && !cand.series);
      });
    }

    /* ---------------------------------------------------------------- *
     * UI primitives
     * ---------------------------------------------------------------- */
    function Badge({children, kind}){ return <span className={"badge " + (kind||"")}>{children}</span>; }
    function Modal({open, title, subtitle, children, onClose, footer, wide}){
      if(!open) return null;
      return (
        <div className="overlay" role="dialog" aria-modal="true" onMouseDown={(e)=>{ if(e.target===e.currentTarget) onClose?.(); }}>
          <div className={"modal"+(wide?" wide":"")} onMouseDown={(e)=>e.stopPropagation()}>
            <div className="head">
              <div style={{display:"flex", justifyContent:"space-between", gap:12, alignItems:"center"}}>
                <div><h2>{title}</h2>{subtitle ? <div className="help" style={{marginTop:6}}>{subtitle}</div> : null}</div>
                <button className="ghost icon" onClick={onClose} aria-label="Close">✕</button>
              </div>
            </div>
            <div className="body">{children}</div>
            {footer ? <div className="foot">{footer}</div> : null}
          </div>
        </div>
      );
    }
    function Confidence({v}){
      if(v==null) return null;
      const pct = Math.round(Number(v)*100);
      const col = pct>=75 ? "var(--accent2)" : pct>=45 ? "var(--gold)" : "var(--danger)";
      return <span className="conf" title="Gemini confidence"><span style={{width:8,height:8,borderRadius:99,background:col,display:"inline-block"}} /><b>{pct}%</b> sure</span>;
    }

    /* ---------------------------------------------------------------- *
     * Mug editor
     * ---------------------------------------------------------------- */
    function validateMug(m){
      const e = {};
      if(!m.name || !m.name.trim()) e.name = "A name/character is required.";
      if(m.year!=="" && m.year!=null){ const y=Number(m.year); if(!Number.isInteger(y)||y<1900||y>2100) e.year="Year must be 1900–2100."; }
      if(m.price!=="" && m.price!=null){ const p=Number(m.price); if(!Number.isFinite(p)||p<0) e.price="Price must be a positive number."; }
      return e;
    }
    function MugForm({open, onClose, initial, onSave, mugs, mode}){
      const [d, setD] = useState(initial);
      const [tagInput, setTagInput] = useState((initial?.tags||[]).join(", "));
      const [errors, setErrors] = useState({});
      const uploadRef = useRef(null);
      useEffect(()=>{ setD(initial); setTagInput((initial?.tags||[]).join(", ")); setErrors({}); }, [initial, open]);
      const dups = useMemo(()=> (mode==="create" && d) ? findDuplicates(d, mugs||[]) : [], [d?.name, d?.year, d?.series, mode, mugs]);
      if(!d) return null;
      const up = (patch)=>setD(x=>({...x, ...patch}));

      const footer = (<>
        <button onClick={onClose}>Cancel</button>
        <button className="primary" onClick={()=>{
          const next = { ...d, year: d.year==="" ? "" : Number(d.year), price: d.price==="" ? "" : Number(d.price), acquiredDate: toISODate(d.acquiredDate), tags: tokenizeTags(tagInput) };
          const e = validateMug(next); setErrors(e); if(Object.keys(e).length) return;
          onSave(next); onClose();
        }}>Save mug</button>
      </>);

      return (
        <Modal open={open} title={mode==="edit"?"Edit mug":"Add mug"} subtitle="Fill in as little or as much as you like — you can always edit later." onClose={onClose} footer={footer}>
          <div className="grid" style={{gap:12}}>
            {d.photoUrl ? <div className="card" style={{overflow:"hidden"}}><img src={d.photoUrl} alt="Mug" style={{width:"100%",maxHeight:240,objectFit:"cover",display:"block"}} /></div> : null}
            {d.aiConfidence!=null ? <div className="row" style={{justifyContent:"space-between"}}><Confidence v={d.aiConfidence} /><span className="help">Auto-identified — please double-check.</span></div> : null}
            {dups.length ? <div className="note warn">⚠︎ You may already own this: {dups.map(x=>x.name + (x.year?` (${x.year})`:"")).join(", ")}. Save anyway if it's a second one.</div> : null}

            <div className="row">
              <div className="field" style={{flex:2, minWidth:200}}>
                <label>Name / character *</label>
                <input value={d.name} onChange={e=>up({name:e.target.value})} placeholder="e.g. Moominmamma" />
                {errors.name ? <div className="err">{errors.name}</div> : null}
              </div>
              <div className="field" style={{minWidth:150}}>
                <label>Status *</label>
                <select value={d.status} onChange={e=>up({status:e.target.value})}>{STATUSES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</select>
              </div>
            </div>
            <div className="row">
              <div className="field"><label>Series</label><input value={d.series} onChange={e=>up({series:e.target.value})} placeholder="e.g. Arabia Moomin" /></div>
              <div className="field"><label>Edition</label><input value={d.edition} onChange={e=>up({edition:e.target.value})} placeholder="Standard / Seasonal / Limited" /></div>
            </div>
            <div className="row">
              <div className="field"><label>Year</label><input inputMode="numeric" value={d.year} onChange={e=>up({year:e.target.value})} placeholder="e.g. 2019" />{errors.year?<div className="err">{errors.year}</div>:null}</div>
              <div className="field"><label>Condition</label><select value={d.condition} onChange={e=>up({condition:e.target.value})}>{CONDITIONS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
            </div>
            <div className="field"><label>Condition notes {d.conditionNotes && d.aiConfidence!=null ? <span className="mini">(from photo)</span>:null}</label><input value={d.conditionNotes} onChange={e=>up({conditionNotes:e.target.value})} placeholder="Chips, crazing, gilding wear…" /></div>
            <div className="row">
              <div className="field"><label>Location</label><input value={d.location} onChange={e=>up({location:e.target.value})} placeholder="e.g. Living-room shelf" /></div>
              <div className="field"><label>Acquired date</label><input type="date" value={toISODate(d.acquiredDate)} onChange={e=>up({acquiredDate:e.target.value})} /></div>
            </div>
            <div className="row">
              <div className="field"><label>Paid</label><input inputMode="decimal" value={d.price} onChange={e=>up({price:e.target.value})} placeholder="e.g. 249" />{errors.price?<div className="err">{errors.price}</div>:null}</div>
              <div className="field"><label>Currency</label><input value={d.currency} onChange={e=>up({currency:e.target.value})} placeholder="SEK" /></div>
            </div>
            <div className="row">
              <div className="field"><label>Est. value (low)</label><input inputMode="decimal" value={d.estValueLow ?? ""} onChange={e=>up({estValueLow: e.target.value===""?null:Number(e.target.value)})} placeholder="—" /></div>
              <div className="field"><label>Est. value (high)</label><input inputMode="decimal" value={d.estValueHigh ?? ""} onChange={e=>up({estValueHigh: e.target.value===""?null:Number(e.target.value)})} placeholder="—" /></div>
              <div className="field" style={{maxWidth:120}}><label>Val. currency</label><input value={d.estValueCurrency||""} onChange={e=>up({estValueCurrency:e.target.value})} placeholder="SEK" /></div>
            </div>
            <div className="field"><label>Tags</label><input value={tagInput} onChange={e=>setTagInput(e.target.value)} placeholder="limited, blue, snufkin" /><div className="help">Separate with commas.</div></div>
            <div className="switch"><span className="mini">Mark as favorite ★</span><input type="checkbox" checked={!!d.favorite} onChange={e=>up({favorite:e.target.checked})} style={{width:"auto"}} /></div>
            <div className="field">
              <label>Photo</label>
              <div className="row">
                <button type="button" onClick={()=>uploadRef.current?.click()}>Upload / replace</button>
                <button type="button" className={d.photoUrl?"danger":""} disabled={!d.photoUrl} onClick={()=>up({photoUrl:""})}>Clear</button>
                <input className="sr-only" ref={uploadRef} type="file" accept="image/*" onChange={async e=>{ const f=e.target.files?.[0]; if(!f)return; const raw=await fileToDataUrl(f); up({photoUrl: await downscaleImage(raw)}); e.target.value=""; }} />
              </div>
              <div className="help">Stored locally in your browser, like the rest of your data.</div>
            </div>
            <div className="field"><label>Notes</label><textarea value={d.notes} onChange={e=>up({notes:e.target.value})} placeholder="Anything worth remembering…" /></div>
          </div>
        </Modal>
      );
    }

    /* ---------------------------------------------------------------- *
     * Scan modal (single photo -> identify, or shelf -> batch)
     * ---------------------------------------------------------------- */
    function ScanModal({open, onClose, settings, onAddOne, onAddMany, mugs, openSettings}){
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState("");
      const [items, setItems] = useState([]); // {draft, checked}
      const [photoUrl, setPhotoUrl] = useState("");
      const camRef = useRef(null), fileRef = useRef(null);

      useEffect(()=>{ if(open){ setBusy(false); setError(""); setItems([]); setPhotoUrl(""); } }, [open]);

      const run = async (file, shelf)=>{
        setError("");
        if(!settings.apiKey){ setError("Add your Gemini API key in Settings first."); return; }
        if(!file) return;
        setBusy(true); setItems([]);
        try{
          const raw = await fileToDataUrl(file);
          const small = await downscaleImage(raw, 1400, 0.85);
          setPhotoUrl(small);
          if(shelf){
            const results = await identifyShelf(settings, small);
            if(!results.length){ setError("No mugs detected. Try a clearer, closer photo."); }
            setItems(results.map(r=>({ draft: draftFromAI(r, settings, ""), checked: r.isMoominMug!==false, position: r.position||"" })));
          }else{
            const r = await identifyMug(settings, small);
            if(r.isMoominMug===false){ setError("That doesn't look like a Moomin mug — but you can still add it manually."); }
            setItems([{ draft: draftFromAI(r, settings, small), checked:true }]);
          }
        }catch(err){ setError(err.message||String(err)); }
        finally{ setBusy(false); }
      };

      const single = items.length===1 && !items[0].position;
      const patchItem = (i, patch)=> setItems(list=> list.map((it,idx)=> idx===i ? {...it, draft:{...it.draft, ...patch}} : it));

      const footer = items.length ? (<>
        <button onClick={()=>{ setItems([]); setPhotoUrl(""); }}>Rescan</button>
        {single ? (
          <button className="primary" onClick={()=>{ onAddOne(items[0].draft); onClose(); }}>Review &amp; add</button>
        ) : (
          <button className="primary" onClick={()=>{ onAddMany(items.filter(it=>it.checked).map(it=>it.draft)); onClose(); }}>
            Add {items.filter(it=>it.checked).length} selected
          </button>
        )}
      </>) : null;

      return (
        <Modal open={open} onClose={onClose} wide
          title="Scan a mug"
          subtitle="Snap one mug to auto-fill it, or a whole shelf to batch-add. Powered by Gemini vision."
          footer={footer}>

          {!settings.apiKey ? <div className="note warn" style={{marginBottom:12}}>No Gemini key yet. <a href="#" onClick={e=>{e.preventDefault();openSettings();}}>Add one in Settings</a> to enable scanning.</div> : null}

          {!items.length && !busy ? (
            <div className="grid" style={{gap:12}}>
              <div className="row">
                <button className="primary" style={{flex:1, justifyContent:"center", padding:"14px"}} onClick={()=>camRef.current?.click()}>📷 Take photo</button>
                <button style={{flex:1, justifyContent:"center", padding:"14px"}} onClick={()=>fileRef.current?.click()}>🖼 Choose image</button>
              </div>
              <div className="switch">
                <span className="mini"><b>Shelf mode</b> — detect several mugs in one photo</span>
                <label className="mini" style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input id="shelfmode" type="checkbox" style={{width:"auto"}} /> batch
                </label>
              </div>
              <input className="sr-only" ref={camRef} type="file" accept="image/*" capture="environment"
                onChange={e=>{ const f=e.target.files?.[0]; run(f, document.getElementById("shelfmode")?.checked); e.target.value=""; }} />
              <input className="sr-only" ref={fileRef} type="file" accept="image/*"
                onChange={e=>{ const f=e.target.files?.[0]; run(f, document.getElementById("shelfmode")?.checked); e.target.value=""; }} />
              <div className="help">Tip: good light and a straight-on angle help a lot. Shelf mode works best when each mug is clearly visible.</div>
            </div>
          ) : null}

          {busy ? <div className="drop"><span className="spin" /> <div style={{marginTop:8}}>Looking at your photo…</div></div> : null}
          {error ? <div className="err" style={{marginTop:10}}>{error}</div> : null}

          {items.length && !busy ? (
            <div className="grid" style={{gap:10, marginTop: error?10:0}}>
              {photoUrl ? <div className="card" style={{overflow:"hidden"}}><img src={photoUrl} alt="scan" style={{width:"100%",maxHeight:220,objectFit:"cover",display:"block"}} /></div> : null}
              {items.map((it, i)=>{
                const dups = findDuplicates(it.draft, mugs||[]);
                return (
                  <div className="scanrow" key={i}>
                    {!single ? <input type="checkbox" checked={it.checked} onChange={e=>setItems(list=>list.map((x,idx)=>idx===i?{...x,checked:e.target.checked}:x))} style={{width:"auto",marginTop:4}} /> : null}
                    <div style={{flex:1, minWidth:0}}>
                      <div className="row" style={{justifyContent:"space-between"}}>
                        <input value={it.draft.name} onChange={e=>patchItem(i,{name:e.target.value})} style={{fontWeight:800, maxWidth:220}} />
                        <Confidence v={it.draft.aiConfidence} />
                      </div>
                      <div className="row" style={{marginTop:8}}>
                        <input value={it.draft.series} onChange={e=>patchItem(i,{series:e.target.value})} placeholder="Series" style={{flex:2,minWidth:120}} />
                        <input value={it.draft.year} onChange={e=>patchItem(i,{year:e.target.value})} placeholder="Year" style={{maxWidth:90}} />
                        <input value={it.draft.edition} onChange={e=>patchItem(i,{edition:e.target.value})} placeholder="Edition" style={{flex:1,minWidth:100}} />
                      </div>
                      <div className="badges" style={{marginTop:8}}>
                        {it.position ? <Badge>📍 {it.position}</Badge> : null}
                        {it.draft.condition ? <Badge>✓ {it.draft.condition}</Badge> : null}
                        {(it.draft.estValueLow!=null||it.draft.estValueHigh!=null) ? <Badge>💰 {formatMoney(it.draft.estValueLow ?? it.draft.estValueHigh, it.draft.estValueCurrency)}{it.draft.estValueHigh!=null&&it.draft.estValueLow!=null?`–${formatMoney(it.draft.estValueHigh, it.draft.estValueCurrency)}`:""}</Badge> : null}
                        {dups.length ? <Badge kind="fav">⚠︎ possible duplicate</Badge> : null}
                      </div>
                      {it.draft.conditionNotes ? <div className="mini" style={{marginTop:6}}>{it.draft.conditionNotes}</div> : null}
                    </div>
                  </div>
                );
              })}
              {!single ? <div className="help">Untick anything you don't want, edit inline, then add. Duplicates are flagged but not blocked.</div> : null}
            </div>
          ) : null}
        </Modal>
      );
    }

    /* ---------------------------------------------------------------- *
     * Gap finder (series catalog -> what you're missing)
     * ---------------------------------------------------------------- */
    function GapFinder({open, onClose, settings, mugs, onAddWishlist, openSettings}){
      const [series, setSeries] = useState("Arabia Moomin");
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState("");
      const [rows, setRows] = useState(null);

      useEffect(()=>{ if(open){ setBusy(false); setError(""); setRows(null); } }, [open]);

      const ownedNames = useMemo(()=> new Set(mugs.filter(m=>m.status!=="wishlist").map(m=>normalizeText(m.name))), [mugs]);

      const run = async ()=>{
        setError("");
        if(!settings.apiKey){ setError("Add your Gemini API key in Settings first."); return; }
        setBusy(true); setRows(null);
        try{
          const cat = await findSeriesMugs(settings, series.trim());
          if(!cat.length){ setError("No results — try a more specific series name."); }
          setRows(cat.map(c=>({ ...c, owned: ownedNames.has(normalizeText(c.character)) })));
        }catch(err){ setError(err.message||String(err)); }
        finally{ setBusy(false); }
      };

      const missing = (rows||[]).filter(r=>!r.owned);
      const footer = rows ? (<>
        <button onClick={()=>setRows(null)}>New search</button>
        <button className="primary" disabled={!missing.length} onClick={()=>{
          const drafts = missing.map(r=>({ ...blankMug(settings), name:r.character, series, edition:r.edition||"", year:(r.year!=null?r.year:""), status:"wishlist", notes:r.notes||"" }));
          onAddWishlist(drafts); onClose();
        }}>Wishlist {missing.length} missing</button>
      </>) : null;

      return (
        <Modal open={open} onClose={onClose} wide title="Find gaps in a series" subtitle="See which mugs from a series you're missing, and wishlist them in one tap." footer={footer}>
          {!settings.apiKey ? <div className="note warn" style={{marginBottom:12}}>No Gemini key yet. <a href="#" onClick={e=>{e.preventDefault();openSettings();}}>Add one in Settings</a>.</div> : null}
          <div className="row">
            <div className="field" style={{flex:1}}><label>Series / line</label><input value={series} onChange={e=>setSeries(e.target.value)} placeholder="e.g. Arabia Moomin, Moomin seasonal winter" /></div>
            <button className="primary" onClick={run} disabled={busy} style={{alignSelf:"flex-end"}}>{busy? <span className="spin"/> : "Search"}</button>
          </div>
          {error ? <div className="err" style={{marginTop:10}}>{error}</div> : null}
          {rows ? (
            <div className="grid" style={{gap:8, marginTop:12}}>
              <div className="help">{rows.filter(r=>r.owned).length} owned · {missing.length} missing (of {rows.length} Gemini listed). AI catalog may be incomplete — treat as a guide.</div>
              {rows.map((r,i)=>(
                <div className="listrow" key={i} style={{opacity: r.owned?0.6:1}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:700}}>{r.owned?"✓ ":""}{r.character}{r.year?<span className="muted"> · {r.year}</span>:null}</div>
                    {r.edition||r.notes ? <div className="mini">{[r.edition, r.notes].filter(Boolean).join(" — ")}</div> : null}
                  </div>
                  <Badge kind={r.owned?"owned":"wishlist"}>{r.owned?"Owned":"Missing"}</Badge>
                </div>
              ))}
            </div>
          ) : null}
        </Modal>
      );
    }

    /* ---------------------------------------------------------------- *
     * Availability ("Find deals") modal
     * ---------------------------------------------------------------- */
    function DealsModal({open, onClose, settings, mug, openSettings}){
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState("");
      const [result, setResult] = useState(null);

      useEffect(()=>{ if(open){ setBusy(false); setError(""); setResult(null); if(settings.apiKey && mug) run(); } }, [open, mug?.id]);

      const run = async ()=>{
        setError("");
        if(!settings.apiKey){ setError("Add your Gemini API key in Settings first."); return; }
        setBusy(true); setResult(null);
        try{ setResult(await checkAvailability(settings, mug)); }
        catch(err){ setError(err.message||String(err)); }
        finally{ setBusy(false); }
      };

      return (
        <Modal open={open} onClose={onClose} title={mug?`Find “${mug.name}”`:"Find deals"} subtitle="On-demand web search across retailers & marketplaces." footer={<button className="primary" onClick={run} disabled={busy}>{busy?<span className="spin"/>:"Search again"}</button>}>
          {!settings.apiKey ? <div className="note warn">No Gemini key yet. <a href="#" onClick={e=>{e.preventDefault();openSettings();}}>Add one in Settings</a>.</div> : null}
          {busy ? <div className="drop"><span className="spin" /><div style={{marginTop:8}}>Searching the web…</div></div> : null}
          {error ? <div className="err">{error}</div> : null}
          {result ? (
            <div className="grid" style={{gap:12}}>
              <div className="note" style={{whiteSpace:"pre-wrap"}}>{result.text}</div>
              {result.sources?.length ? (
                <div className="grid" style={{gap:8}}>
                  <div className="help">Sources</div>
                  {result.sources.map((s,i)=>(<a className="srcitem" key={i} href={s.uri} target="_blank" rel="noopener noreferrer"><b className="link">{s.title}</b><span className="mini">{s.uri}</span></a>))}
                </div>
              ) : <div className="help">No linked sources returned this time.</div>}
              <div className="note warn">Background alerts (get pinged automatically when a wishlisted mug appears) need a small always-on backend — see the note in Settings. This search runs live, only while the app is open.</div>
            </div>
          ) : null}
        </Modal>
      );
    }

    /* ---------------------------------------------------------------- *
     * Settings
     * ---------------------------------------------------------------- */
    function SettingsModal({open, onClose, settings, onSave}){
      const [s, setS] = useState(settings);
      const [models, setModels] = useState([]);
      const [testing, setTesting] = useState(false);
      const [msg, setMsg] = useState("");
      useEffect(()=>{ if(open){ setS(settings); setModels([]); setMsg(""); } }, [open, settings]);
      const up = (p)=>setS(x=>({...x, ...p}));

      const test = async ()=>{
        setMsg(""); setTesting(true);
        try{ const list = await listGeminiModels(s.apiKey); setModels(list); setMsg(`✓ Key works — ${list.length} models available.`); if(list.length && !list.includes(s.model)) up({model: list.find(m=>/flash/i.test(m)) || list[0]}); }
        catch(err){ setMsg("✗ " + (err.message||String(err))); }
        finally{ setTesting(false); }
      };

      const footer = (<>
        <button onClick={onClose}>Close</button>
        <button className="primary" onClick={()=>{ onSave(s); onClose(); }}>Save settings</button>
      </>);

      return (
        <Modal open={open} onClose={onClose} title="Settings" subtitle="Everything stays in your browser." footer={footer}>
          <div className="grid" style={{gap:14}}>
            <div className="field">
              <label>Gemini API key</label>
              <input type="password" value={s.apiKey||""} onChange={e=>up({apiKey:e.target.value})} placeholder="AIza…" autoComplete="off" />
              <div className="help">Get one free at <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer">aistudio.google.com/apikey</a>. Stored only on this device.</div>
            </div>
            <div className="row">
              <button onClick={test} disabled={!s.apiKey || testing}>{testing? <span className="spin"/> : "Test key & load models"}</button>
              {msg ? <span className="mini" style={{color: msg.startsWith("✓")?"var(--accent2)":"var(--danger)"}}>{msg}</span> : null}
            </div>
            <div className="row">
              <div className="field"><label>Model</label>
                <input list="modellist" value={s.model||""} onChange={e=>up({model:e.target.value})} placeholder={DEFAULT_MODEL} />
                <datalist id="modellist">{models.map(m=><option key={m} value={m} />)}</datalist>
                <div className="help">Use a vision-capable model (a “flash” model is fast &amp; cheap).</div>
              </div>
              <div className="field" style={{maxWidth:130}}><label>Currency</label><input value={s.currency||""} onChange={e=>up({currency:e.target.value})} placeholder="SEK" /></div>
            </div>
            <div className="field"><label>Region / market (optional)</label><input value={s.region||""} onChange={e=>up({region:e.target.value})} placeholder="e.g. Sweden" /><div className="help">Biases value estimates &amp; deal searches to your market.</div></div>
            <div className="note warn">
              <b>About background alerts.</b> A static page can't scrape shops or notify you while it's closed. “Find deals” searches live on demand. To get automatically pinged when a wishlisted mug appears, a tiny always-on backend (a scheduled function that searches, plus web-push) is needed — ask Karl to bolt that on and this app is already structured for it.
            </div>
          </div>
        </Modal>
      );
    }

    /* ---------------------------------------------------------------- *
     * Mug card
     * ---------------------------------------------------------------- */
    function MugCard({m, onEdit, onDelete, onFav, onDeals}){
      const val = (m.estValueLow!=null||m.estValueHigh!=null)
        ? `${formatMoney(m.estValueLow ?? m.estValueHigh, m.estValueCurrency||"SEK")}${(m.estValueLow!=null&&m.estValueHigh!=null)?"–"+formatMoney(m.estValueHigh, m.estValueCurrency||"SEK"):""}`
        : "";
      return (
        <div className="card mug">
          <div className="mugphoto">
            {m.photoUrl ? <img src={m.photoUrl} alt={m.name} onError={e=>{e.currentTarget.style.display="none";}} /> : <span className="ph">☕</span>}
            <div className="abschip">
              <Badge kind={m.status}>{m.status==="owned"?"Owned":m.status==="wishlist"?"Wishlist":"Sold"}</Badge>
              {m.favorite ? <Badge kind="fav">★</Badge> : null}
            </div>
          </div>
          <div className="mugbody">
            <div className="mugname" title={m.name}>{m.name || "Untitled"}</div>
            <div className="sub">{[m.series||"—", m.year, m.edition].filter(Boolean).join(" · ")}</div>
            <div className="badges">
              {m.condition ? <Badge>✓ {m.condition}</Badge> : null}
              {m.price!=="" && m.price!=null ? <Badge>💰 {formatMoney(m.price, m.currency||"SEK")}</Badge> : null}
              {val ? <Badge title="Estimated market value">≈ {val}</Badge> : null}
              {m.location ? <Badge>📍 {m.location}</Badge> : null}
            </div>
            {m.tags?.length ? <div className="badges">{m.tags.slice(0,6).map(t=><span key={t} className="chip">#{t}</span>)}</div> : null}
            {m.conditionNotes ? <div className="mini lineclamp">{m.conditionNotes}</div> : null}
            {m.notes ? <div className="mini lineclamp">{m.notes}</div> : null}
            <div className="mugfoot">
              {m.status==="wishlist" ? <button onClick={()=>onDeals(m)}>🔎 Deals</button> : <button onClick={()=>onFav(m)}>{m.favorite?"★":"☆"} Fav</button>}
              <button onClick={()=>onEdit(m)}>Edit</button>
              <button className="danger" onClick={()=>onDelete(m)}>Delete</button>
            </div>
          </div>
        </div>
      );
    }

    /* ---------------------------------------------------------------- *
     * App
     * ---------------------------------------------------------------- */
    function App(){
      const [mugs, setMugs] = useState([]);
      const [settings, setSettings] = useState({apiKey:"", model:DEFAULT_MODEL, currency:"SEK", region:""});
      const [tab, setTab] = useState("collection");

      const [query, setQuery] = useState("");
      const [statusFilter, setStatusFilter] = useState("all");
      const [favoriteOnly, setFavoriteOnly] = useState(false);
      const [sortBy, setSortBy] = useState("updated_desc");

      const [formInitial, setFormInitial] = useState(null);
      const [formMode, setFormMode] = useState("create");
      const [formOpen, setFormOpen] = useState(false);
      const [scanOpen, setScanOpen] = useState(false);
      const [gapOpen, setGapOpen] = useState(false);
      const [settingsOpen, setSettingsOpen] = useState(false);
      const [dealsMug, setDealsMug] = useState(null);
      const importRef = useRef(null);

      useEffect(()=>{ const raw = safeJsonParse(localStorage.getItem(STORAGE_KEY), null); if(Array.isArray(raw)) setMugs(raw); const st = safeJsonParse(localStorage.getItem(SETTINGS_KEY), null); if(st) setSettings(s=>({...s, ...st})); }, []);
      useEffect(()=>{ localStorage.setItem(STORAGE_KEY, JSON.stringify(mugs)); }, [mugs]);
      const saveSettings = (s)=>{ setSettings(s); localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); };

      const upsert = (next)=> setMugs(prev=>{ const now=nowISO(); return prev.some(m=>m.id===next.id) ? prev.map(m=>m.id===next.id?{...m,...next,updatedAt:now}:m) : [{...next, createdAt:now, updatedAt:now}, ...prev]; });
      const addMany = (drafts)=> setMugs(prev=>{ const now=nowISO(); const add = drafts.map(d=>({...d, id:d.id||uid(), createdAt:now, updatedAt:now})); return [...add, ...prev]; });
      const del = (m)=>{ if(!confirm(`Delete "${m.name}"?`)) return; setMugs(prev=>prev.filter(x=>x.id!==m.id)); };
      const fav = (m)=> setMugs(prev=>prev.map(x=>x.id===m.id?{...x, favorite:!x.favorite, updatedAt:nowISO()}:x));

      const openCreate = ()=>{ setFormInitial(blankMug(settings)); setFormMode("create"); setFormOpen(true); };
      const openEdit = (m)=>{ setFormInitial({...m}); setFormMode("edit"); setFormOpen(true); };
      const openReview = (draft)=>{ setFormInitial(draft); setFormMode("create"); setFormOpen(true); };

      const viewMugs = useMemo(()=>{
        const q = normalizeText(query);
        let out = mugs.filter(m=>{
          if(tab==="wishlist"){ if(m.status!=="wishlist") return false; }
          else if(statusFilter!=="all" && m.status!==statusFilter) return false;
          if(favoriteOnly && !m.favorite) return false;
          if(!q) return true;
          const hay = [m.name,m.series,m.edition,m.condition,m.conditionNotes,m.location,m.notes,...(m.tags||[]),m.year].filter(x=>x!=null).join(" ");
          return normalizeText(hay).includes(q);
        });
        out.sort((a,b)=>{
          const au=a.updatedAt?Date.parse(a.updatedAt):0, bu=b.updatedAt?Date.parse(b.updatedAt):0;
          if(sortBy==="updated_desc") return bu-au;
          if(sortBy==="updated_asc") return au-bu;
          if(sortBy==="year_desc") return (Number(b.year)||0)-(Number(a.year)||0);
          if(sortBy==="year_asc") return (Number(a.year)||0)-(Number(b.year)||0);
          if(sortBy==="value_desc") return (Number(b.estValueHigh ?? b.estValueLow)||0)-(Number(a.estValueHigh ?? a.estValueLow)||0);
          return normalizeText(a.name).localeCompare(normalizeText(b.name));
        });
        return out;
      }, [mugs, query, statusFilter, favoriteOnly, sortBy, tab]);

      const stats = useMemo(()=>{
        const owned = mugs.filter(m=>m.status==="owned");
        const spent = owned.map(m=>Number(m.price)).filter(Number.isFinite).reduce((a,b)=>a+b,0);
        const value = owned.map(m=>Number(m.estValueHigh ?? m.estValueLow)).filter(Number.isFinite).reduce((a,b)=>a+b,0);
        const byYear = new Map(); for(const m of mugs){ const y=Number(m.year); if(Number.isFinite(y)) byYear.set(y,(byYear.get(y)||0)+1); }
        const byYearData = [...byYear.entries()].sort((a,b)=>a[0]-b[0]).slice(-14).map(([year,count])=>({year:String(year),count}));
        const charCount = new Map(); for(const m of mugs){ const k=(m.name||"").trim(); if(k) charCount.set(k,(charCount.get(k)||0)+1); }
        const topChars = [...charCount.entries()].sort((a,b)=>b[1]-a[1]).slice(0,8).map(([name,count])=>({name,count}));
        const maxYear = Math.max(1,...byYearData.map(d=>d.count));
        return {
          owned: owned.length,
          wishlist: mugs.filter(m=>m.status==="wishlist").length,
          sold: mugs.filter(m=>m.status==="sold").length,
          favorites: mugs.filter(m=>m.favorite).length,
          spent, value, byYearData, topChars, maxYear,
          valueCur: owned.find(m=>m.estValueCurrency)?.estValueCurrency || settings.currency || "SEK",
        };
      }, [mugs, settings.currency]);

      const exportJson = ()=>{ const blob=new Blob([JSON.stringify(mugs,null,2)],{type:"application/json"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`moomin-mugs-${nowISO().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url); };
      const importJson = (file)=>{ if(!file) return; const r=new FileReader(); r.onload=()=>{ const parsed=safeJsonParse(r.result,null); if(!Array.isArray(parsed)){ alert("Import failed: expected a JSON array."); return; } setMugs(prev=>{ const map=new Map(prev.map(m=>[m.id,m])); for(const m of parsed){ const id=m?.id||uid(); map.set(id, {...blankMug(settings), ...m, id}); } return [...map.values()]; }); }; r.readAsText(file); };
      const clearAll = ()=>{ if(!confirm("Clear all mugs from this browser?")) return; setMugs([]); };

      const TABS = [
        {k:"collection", label:"Collection"},
        {k:"wishlist", label:`Wishlist${stats.wishlist?` (${stats.wishlist})`:""}`},
        {k:"stats", label:"Stats"},
      ];

      return (
        <div className="wrap">
          <div className="top">
            <div className="brand">
              <div className="logo">☕</div>
              <div className="title"><h1>Moomin Mug Collection</h1><div className="sub">Photograph, identify & track — everything stays on this device.</div></div>
            </div>
            <div className="actions">
              <button className="primary" onClick={()=>setScanOpen(true)}>📷 Scan</button>
              <button onClick={()=>setGapOpen(true)}>✨ Gaps</button>
              <button onClick={exportJson}>⬇︎</button>
              <button onClick={()=>importRef.current?.click()}>⬆︎</button>
              <button className="ghost icon" title="Settings" onClick={()=>setSettingsOpen(true)}>⚙︎</button>
              <input ref={importRef} type="file" accept="application/json" className="sr-only" onChange={e=>{ const f=e.target.files?.[0]; if(f) importJson(f); e.target.value=""; }} />
            </div>
          </div>

          <div className="tabs">
            {TABS.map(t=><button key={t.k} className={"tabbtn "+(tab===t.k?"active":"")} onClick={()=>setTab(t.k)}>{t.label}</button>)}
          </div>

          {tab!=="stats" ? (
            <>
              <div className="card pad" style={{marginBottom:12}}>
                <div className="row">
                  <div className="field" style={{flex:2, minWidth:200}}><label>Search</label><input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search name, series, tags, notes…" /></div>
                  {tab==="collection" ? (
                    <div className="field" style={{minWidth:150}}><label>Status</label>
                      <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}><option value="all">All</option>{STATUSES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</select>
                    </div>
                  ) : null}
                  <div className="field" style={{minWidth:170}}><label>Sort</label>
                    <select value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                      <option value="updated_desc">Recently updated</option>
                      <option value="year_desc">Year (new → old)</option>
                      <option value="year_asc">Year (old → new)</option>
                      <option value="value_desc">Value (high → low)</option>
                      <option value="name">Name (A → Z)</option>
                    </select>
                  </div>
                  <div className="field" style={{maxWidth:150}}><label>Favorites</label>
                    <div className="switch"><span className="mini">★ only</span><input type="checkbox" checked={favoriteOnly} onChange={e=>setFavoriteOnly(e.target.checked)} style={{width:"auto"}} /></div>
                  </div>
                </div>
                <div className="row" style={{justifyContent:"space-between", marginTop:10}}>
                  <div className="row"><span className="pill">{viewMugs.length} shown</span><span className="pill">{mugs.length} total</span></div>
                  <button onClick={openCreate}>＋ Add manually</button>
                </div>
              </div>

              {mugs.length===0 ? (
                <div className="card pad" style={{textAlign:"center"}}>
                  <div style={{fontSize:40}}>📷</div>
                  <div style={{fontWeight:900, marginTop:8}}>Start your collection</div>
                  <div className="sub" style={{marginTop:6}}>Snap a mug and let Gemini fill in the details, or add one by hand.</div>
                  <div className="row" style={{justifyContent:"center", marginTop:14}}>
                    <button className="primary" onClick={()=>setScanOpen(true)}>📷 Scan a mug</button>
                    <button onClick={openCreate}>＋ Add manually</button>
                  </div>
                  {!settings.apiKey ? <div className="help" style={{marginTop:10}}>Tip: add your Gemini key in ⚙︎ Settings to enable scanning.</div> : null}
                </div>
              ) : viewMugs.length===0 ? (
                <div className="card pad"><div className="muted">No mugs match your filters.</div></div>
              ) : (
                <div className="muggrid">
                  {viewMugs.map(m=><MugCard key={m.id} m={m} onEdit={openEdit} onDelete={del} onFav={fav} onDeals={setDealsMug} />)}
                </div>
              )}

              {tab==="wishlist" ? <div className="help" style={{marginTop:12}}>Tip: use ✨ Gaps to auto-fill your wishlist from a whole series, then tap 🔎 Deals on any mug to search the web for it.</div> : null}
            </>
          ) : (
            <>
              <div className="kpi">
                <div className="card kpicard"><div className="kpilabel">Owned</div><div className="kpivalue">{stats.owned}</div></div>
                <div className="card kpicard"><div className="kpilabel">Wishlist</div><div className="kpivalue">{stats.wishlist}</div></div>
                <div className="card kpicard"><div className="kpilabel">Favorites</div><div className="kpivalue">{stats.favorites}</div></div>
                <div className="card kpicard"><div className="kpilabel">Sold</div><div className="kpivalue">{stats.sold}</div></div>
              </div>
              <div className="grid" style={{gap:12, marginTop:12}}>
                <div className="row" style={{gap:12}}>
                  <div className="card pad" style={{flex:1, minWidth:200}}><div style={{fontWeight:800}}>Total paid (owned)</div><div style={{fontSize:24,fontWeight:900,marginTop:6}}>{formatMoney(stats.spent, settings.currency||"SEK")}</div></div>
                  <div className="card pad" style={{flex:1, minWidth:200}}><div style={{fontWeight:800}}>Est. collection value</div><div style={{fontSize:24,fontWeight:900,marginTop:6}}>{formatMoney(stats.value, stats.valueCur)}</div><div className="help" style={{marginTop:4}}>Sum of high estimates on owned mugs.</div></div>
                </div>
                <div className="card pad">
                  <div style={{fontWeight:800}}>Mugs by year</div><div className="divider" />
                  {stats.byYearData.length ? <div className="list">{stats.byYearData.map(r=>(
                    <div key={r.year} className="listrow"><div style={{fontWeight:700, width:52}}>{r.year}</div><div className="bar"><span style={{width:`${(r.count/stats.maxYear)*100}%`}} /></div><span className="pill">{r.count}</span></div>
                  ))}</div> : <div className="muted">Add years to your mugs to see this.</div>}
                </div>
                <div className="card pad">
                  <div style={{fontWeight:800}}>Top characters</div><div className="divider" />
                  {stats.topChars.length ? <div className="list">{stats.topChars.map(t=>(
                    <div key={t.name} className="listrow"><div>{t.name}</div><span className="pill">{t.count}</span></div>
                  ))}</div> : <div className="muted">Add mugs to see trends.</div>}
                </div>
                <div className="card pad row" style={{justifyContent:"space-between"}}>
                  <div><div style={{fontWeight:800}}>Backup</div><div className="help">Export a JSON copy, or clear everything on this device.</div></div>
                  <div className="row"><button onClick={exportJson}>⬇︎ Export</button><button className="danger" onClick={clearAll}>🗑 Clear all</button></div>
                </div>
              </div>
            </>
          )}

          <button className="primary fab" onClick={()=>setScanOpen(true)} aria-label="Scan">📷</button>

          <MugForm open={formOpen} onClose={()=>setFormOpen(false)} initial={formInitial} mode={formMode} mugs={mugs} onSave={upsert} />
          <ScanModal open={scanOpen} onClose={()=>setScanOpen(false)} settings={settings} mugs={mugs} onAddOne={openReview} onAddMany={addMany} openSettings={()=>{setScanOpen(false);setSettingsOpen(true);}} />
          <GapFinder open={gapOpen} onClose={()=>setGapOpen(false)} settings={settings} mugs={mugs} onAddWishlist={(d)=>{addMany(d); setTab("wishlist");}} openSettings={()=>{setGapOpen(false);setSettingsOpen(true);}} />
          <DealsModal open={!!dealsMug} onClose={()=>setDealsMug(null)} settings={settings} mug={dealsMug} openSettings={()=>{setDealsMug(null);setSettingsOpen(true);}} />
          <SettingsModal open={settingsOpen} onClose={()=>setSettingsOpen(false)} settings={settings} onSave={saveSettings} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
